<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="docgen">
  <title>docgen</title>
  <!-- Hub & orbit: knowledge radiating from a source. All-amber so the mark
       reads on both light and dark backgrounds without theme-specific assets. -->
  <circle cx="32" cy="32" r="19" fill="none" stroke="#e0a24a" stroke-width="1.6"
          stroke-dasharray="1.5 4.5" stroke-linecap="round" opacity="0.45"/>
  <g stroke="#e0a24a" stroke-width="2.4" stroke-linecap="round">
    <line x1="32" y1="32" x2="32" y2="13"/>
    <line x1="32" y1="32" x2="48.45" y2="41.5"/>
    <line x1="32" y1="32" x2="15.55" y2="41.5"/>
  </g>
  <g fill="#e0a24a">
    <circle cx="32" cy="13" r="5"/>
    <circle cx="48.45" cy="41.5" r="5"/>
    <circle cx="15.55" cy="41.5" r="5"/>
  </g>
  <circle cx="32" cy="32" r="8" fill="#c4832e"/>
  <circle cx="32" cy="32" r="3.2" fill="#f2c98a"/>
</svg>
