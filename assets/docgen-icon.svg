<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="docgen">
  <title>docgen</title>
  <!-- Favicon-safe hub & orbit: no dashed ring (it disappears at 16px), bolder
       nodes and edges so the mark holds at small sizes. -->
  <g stroke="#e0a24a" stroke-width="4" stroke-linecap="round">
    <line x1="32" y1="32" x2="32" y2="12"/>
    <line x1="32" y1="32" x2="49.3" y2="42"/>
    <line x1="32" y1="32" x2="14.7" y2="42"/>
  </g>
  <g fill="#e0a24a">
    <circle cx="32" cy="12" r="7"/>
    <circle cx="49.3" cy="42" r="7"/>
    <circle cx="14.7" cy="42" r="7"/>
  </g>
  <circle cx="32" cy="32" r="10.5" fill="#c4832e"/>
  <circle cx="32" cy="32" r="4.2" fill="#f2c98a"/>
</svg>
