# Configuration for docgen's own documentation site.
# Deployed as a GitHub *project* page at https://iammaxim.github.io/docgen-rs/,
# so everything lives under the /docgen-rs/ sub-path.
title = "docgen"
base = "/docgen-rs"

# Every feature on — this site is also a live demo, so it must exercise them all.
[features]
graph = true
math = true
mermaid = true
search = true
# The docs describe PlantUML via fenced examples (no live `:::plantuml`
# directives), so the CI build needs no PlantUML server.
plantuml = true
# Obsidian Bases: `.base` files + ```base blocks, rendered to static HTML at
# build time. The bases feature page embeds a live view over this site.
bases = true

[components]
dir = "components"
