name: release
on:
  push:
    tags: ['v*']
permissions:
  contents: write
jobs:
  build:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest,  target: x86_64-unknown-linux-gnu,  ext: tgz }
          - { os: ubuntu-latest,  target: aarch64-unknown-linux-gnu, ext: tgz }
          - { os: macos-latest,   target: x86_64-apple-darwin,       ext: tgz }
          - { os: macos-latest,   target: aarch64-apple-darwin,      ext: tgz }
          # Windows (x86_64-pc-windows-msvc) is intentionally omitted: the
          # `katex` crate's default quick-js backend does not compile on the
          # Windows MSVC target. Revisit if katex moves to a cross-platform
          # backend (e.g. wasm-js).
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with: { targets: '${{ matrix.target }}' }
      - name: Install cross deps (linux aarch64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo 'CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc' >> "$GITHUB_ENV"
      - name: Build
        run: cargo build --release --locked -p docgen-rs --target ${{ matrix.target }}
      - name: Package
        run: |
          dir="docgen-${{ matrix.target }}"
          mkdir "$dir"
          cp "target/${{ matrix.target }}/release/docgen" "$dir/"
          tar czf "$dir.tgz" "$dir"
      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: docgen-${{ matrix.target }}.tgz
