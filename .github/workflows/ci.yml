name: ci
on:
  push:
    branches: [master]
  pull_request:
permissions:
  contents: read
env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings
jobs:
  test:
    name: fmt + clippy + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Format
        run: cargo fmt --all --check
      - name: Clippy
        run: cargo clippy --workspace --all-targets
      - name: Test
        run: cargo test --workspace --locked
      # `--workspace` does NOT cover this. It builds docgen-s3 on its own, where
      # rustls resolves a single crypto provider and everything passes; only
      # docgen-rs with `s3` puts docgen-s3's attohttpc and docgen-plantuml's ureq
      # in one graph, which is where their rustls feature demands unify and can
      # conflict. That gap is why a two-provider build reached a release once
      # already, and it is what tests/crypto_provider.rs checks — a test that is
      # `#![cfg(feature = "s3")]`, so it compiles to nothing without this step.
      - name: Test (s3 feature)
        run: cargo test -p docgen-rs --features s3 --locked

  docs:
    name: docs site builds
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build docs site
        run: cargo run -p docgen-rs -- build website
      - name: Fail on broken wikilinks
        # docgen renders an unresolved [[link]] as a marked span rather than
        # failing the build; catch those so a typo'd link can't ship. Match the
        # exact broken-span attribute, not the bare class name (which also
        # appears in the stylesheet, the search index, and prose that documents
        # the marker).
        run: |
          if grep -rl 'class="docgen-wikilink docgen-wikilink--broken"' website/dist; then
            echo "::error::Broken wikilink(s) found in the built docs site (files listed above)."
            exit 1
          fi
          echo "No broken wikilinks."
