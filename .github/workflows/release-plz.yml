name: release-plz
on:
  push:
    branches: [master]
permissions:
  pull-requests: write
  contents: write
jobs:
  # Publishes crates to crates.io and tags/releases when a release commit lands on master.
  # Uses RELEASE_PLZ_TOKEN (a PAT) so the pushed tag triggers release.yml's binary build
  # (tags pushed with the default GITHUB_TOKEN do not trigger other workflows).
  release-plz-release:
    name: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_PLZ_TOKEN }}
      - uses: dtolnay/rust-toolchain@stable
      - uses: release-plz/action@v0.5
        with:
          command: release
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_PLZ_TOKEN }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  # Opens / updates the "release" PR with version bumps and changelogs.
  # The PAT lets the PR be created (the default GITHUB_TOKEN is forbidden from opening PRs).
  release-plz-pr:
    name: release-pr
    runs-on: ubuntu-latest
    concurrency:
      group: release-plz-${{ github.ref }}
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_PLZ_TOKEN }}
      - uses: dtolnay/rust-toolchain@stable
      - uses: release-plz/action@v0.5
        with:
          command: release-pr
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_PLZ_TOKEN }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
