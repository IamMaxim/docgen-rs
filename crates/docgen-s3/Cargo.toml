[package]
name = "docgen-s3"
description = "Optional S3-compatible asset offload for docgen, the Cargo-only static documentation-site generator"
edition.workspace = true
license.workspace = true
version.workspace = true
repository.workspace = true

[dependencies]
docgen-config = { workspace = true }
docgen-core = { workspace = true }
rust-s3 = { version = "0.37", default-features = false, features = ["sync-rustls-tls"] }
sha2 = "0.10"
anyhow = "1"
